name: Agent guide sync

on:
  push:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'scripts/check-agent-guides.mjs'
      - '.github/workflows/agent-guides-sync.yml'
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'scripts/check-agent-guides.mjs'
      - '.github/workflows/agent-guides-sync.yml'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify AGENTS.md and CLAUDE.md stay byte-identical
        run: node scripts/check-agent-guides.mjs
